name: Render Video

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcairo2-dev \
            libpango1.0-dev \
            ffmpeg \
            texlive \
            texlive-latex-extra \
            texlive-fonts-extra \
            texlive-latex-recommended \
            texlive-science

      - name: Install Python dependencies
        run: pip install manim

      - name: Render videos
        run: python scripts/render_video.py

      - name: Generate thumbnails
        run: python scripts/generate_thumbnails.py

      - name: Export YouTube metadata
        run: python scripts/export_metadata.py > media/youtube_metadata.txt

      - uses: actions/upload-artifact@v4
        with:
          name: rendered-videos
          path: media/videos/**/*.mp4

      - uses: actions/upload-artifact@v4
        with:
          name: thumbnails
          path: media/thumbnails/*.png

      - uses: actions/upload-artifact@v4
        with:
          name: youtube-metadata
          path: media/youtube_metadata.txt
