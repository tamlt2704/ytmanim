name: Render Video

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    container:
      image: manimcommunity/manim:latest

    steps:
      - uses: actions/checkout@v4

      - name: Render videos
        run: python scripts/render_video.py

      - name: Generate thumbnails
        run: python scripts/generate_thumbnails.py

      - name: Export YouTube metadata
        run: python scripts/export_metadata.py > media/youtube_metadata.txt

      - uses: actions/upload-artifact@v4
        with:
          name: rendered-videos
          path: media/videos/**/*.mp4

      - uses: actions/upload-artifact@v4
        with:
          name: thumbnails
          path: media/thumbnails/*.png

      - uses: actions/upload-artifact@v4
        with:
          name: youtube-metadata
          path: media/youtube_metadata.txt
