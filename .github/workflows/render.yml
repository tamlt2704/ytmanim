name: Build Assets

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: motioncanvas/my-animation
        run: npm ci

      - name: Type check scenes
        working-directory: motioncanvas/my-animation
        run: npx tsc --noEmit

      - name: Type check scripts
        working-directory: motioncanvas/my-animation
        run: npx tsc --project tsconfig.scripts.json --noEmit

      - name: Generate thumbnail
        working-directory: motioncanvas/my-animation
        run: npm run thumbnails

      - uses: actions/upload-artifact@v4
        with:
          name: thumbnails
          path: motioncanvas/my-animation/output/thumbnails/
