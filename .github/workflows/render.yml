name: Render Video

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install Motion Canvas dependencies
        working-directory: motioncanvas/my-animation
        run: npm ci

      - name: Render animation
        working-directory: motioncanvas/my-animation
        run: npx motion-canvas render

      - name: Combine video with background music
        run: |
          mkdir -p output/videos

          # Find the rendered video
          VIDEO=$(find motioncanvas/my-animation/output -name "*.mp4" | head -1)
          if [ -z "$VIDEO" ]; then
            echo "No rendered video found"
            exit 1
          fi

          # Get video duration
          DURATION=$(ffprobe -v error -show_entries format=duration -of csv=p=0 "$VIDEO")

          # Add looping music.mp3 as background, stop when animation ends
          ffmpeg -i "$VIDEO" -stream_loop -1 -i music.mp3 \
            -t "$DURATION" \
            -map 0:v -map 1:a \
            -c:v copy -c:a aac -shortest \
            output/videos/final.mp4

      - uses: actions/upload-artifact@v4
        with:
          name: videos
          path: output/videos/
