<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 250">
  <defs>
    <style>
      .label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
      .detail { font-family: monospace; font-size: 10px; }
    </style>
    <marker id="fArr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  <rect width="750" height="250" fill="#fafafa" rx="10"/>
  <text x="375" y="25" text-anchor="middle" class="label" font-size="16" fill="#333">Rate Limiter — Production Architecture</text>
  <!-- Client -->
  <rect x="20" y="90" width="80" height="45" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" rx="6"/>
  <text x="60" y="118" text-anchor="middle" class="label" fill="#333">Client</text>
  <!-- API Gateway -->
  <rect x="140" y="70" width="120" height="85" fill="#e74c3c" stroke="#c0392b" stroke-width="2" rx="8"/>
  <text x="200" y="95" text-anchor="middle" class="label" fill="#fff">API Gateway</text>
  <text x="200" y="115" text-anchor="middle" class="detail" fill="#ffcccc">rate limiter</text>
  <text x="200" y="130" text-anchor="middle" class="detail" fill="#ffcccc">auth check</text>
  <text x="200" y="145" text-anchor="middle" class="detail" fill="#ffcccc">routing</text>
  <!-- Redis -->
  <rect x="140" y="180" width="120" height="40" fill="#2ecc71" stroke="#27ae60" stroke-width="2" rx="6"/>
  <text x="200" y="205" text-anchor="middle" class="label" fill="#fff">Redis</text>
  <!-- API Servers -->
  <rect x="310" y="80" width="100" height="30" fill="#9b59b6" stroke="#8e44ad" stroke-width="1.5" rx="5"/>
  <text x="360" y="100" text-anchor="middle" class="detail" fill="#fff">Server 1</text>
  <rect x="310" y="115" width="100" height="30" fill="#9b59b6" stroke="#8e44ad" stroke-width="1.5" rx="5"/>
  <text x="360" y="135" text-anchor="middle" class="detail" fill="#fff">Server 2</text>
  <!-- DB -->
  <rect x="460" y="90" width="90" height="45" fill="#e67e22" stroke="#d35400" stroke-width="2" rx="6"/>
  <text x="505" y="118" text-anchor="middle" class="label" fill="#fff">DB</text>
  <!-- Arrows -->
  <line x1="100" y1="112" x2="135" y2="112" stroke="#333" stroke-width="2" marker-end="url(#fArr)"/>
  <line x1="260" y1="95" x2="305" y2="95" stroke="#2ecc71" stroke-width="2" marker-end="url(#fArr)"/>
  <line x1="260" y1="130" x2="305" y2="130" stroke="#2ecc71" stroke-width="2" marker-end="url(#fArr)"/>
  <line x1="410" y1="112" x2="455" y2="112" stroke="#333" stroke-width="1.5" marker-end="url(#fArr)"/>
  <!-- Gateway to Redis -->
  <line x1="200" y1="155" x2="200" y2="175" stroke="#2ecc71" stroke-width="1.5" marker-end="url(#fArr)"/>
  <text x="220" y="170" class="detail" fill="#2ecc71">check</text>
  <!-- 429 response -->
  <rect x="560" y="90" width="150" height="45" fill="#f5f5f5" stroke="#e74c3c" stroke-width="1.5" rx="6"/>
  <text x="635" y="108" text-anchor="middle" class="detail" fill="#e74c3c">429 Too Many Requests</text>
  <text x="635" y="125" text-anchor="middle" class="detail" fill="#888">Retry-After: 30</text>
  <!-- Blocked arrow -->
  <path d="M200,70 Q200,50 560,90" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#fArr)"/>
  <text x="380" y="55" text-anchor="middle" class="detail" fill="#e74c3c">blocked → 429</text>
</svg>
