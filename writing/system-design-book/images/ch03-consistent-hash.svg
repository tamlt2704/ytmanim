<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <style>
      .hand { font-family: 'Segoe Script', 'Comic Sans MS', cursive; }
      .mono { font-family: monospace; font-size: 10px; }
    </style>
  </defs>
  <rect width="500" height="500" fill="#fffef0" rx="8"/>
  <text x="250" y="28" text-anchor="middle" class="hand" font-size="18" fill="#333">Consistent Hashing Ring</text>
  <!-- Ring -->
  <circle cx="250" cy="270" r="160" fill="none" stroke="#ddd" stroke-width="3"/>
  <!-- Node positions on ring -->
  <!-- Node 1 (top) -->
  <circle cx="250" cy="110" r="18" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <text x="250" y="115" text-anchor="middle" class="hand" font-size="11" fill="#fff">N1</text>
  <text x="250" y="85" text-anchor="middle" class="hand" font-size="10" fill="#3498db">Node 1</text>
  <!-- Node 2 (bottom-right) -->
  <circle cx="389" cy="350" r="18" fill="#2ecc71" stroke="#27ae60" stroke-width="2"/>
  <text x="389" y="355" text-anchor="middle" class="hand" font-size="11" fill="#fff">N2</text>
  <text x="430" y="345" text-anchor="middle" class="hand" font-size="10" fill="#2ecc71">Node 2</text>
  <!-- Node 3 (bottom-left) -->
  <circle cx="111" cy="350" r="18" fill="#e67e22" stroke="#d35400" stroke-width="2"/>
  <text x="111" y="355" text-anchor="middle" class="hand" font-size="11" fill="#fff">N3</text>
  <text x="70" y="345" text-anchor="middle" class="hand" font-size="10" fill="#e67e22">Node 3</text>
  <!-- Keys on ring -->
  <circle cx="330" cy="140" r="8" fill="#FFD93D" stroke="#333" stroke-width="1.5"/>
  <text x="355" y="135" class="mono" fill="#333">key:A</text>
  <text x="355" y="148" class="mono" fill="#3498db">→ N1</text>
  <circle cx="405" cy="230" r="8" fill="#FFD93D" stroke="#333" stroke-width="1.5"/>
  <text x="430" y="225" class="mono" fill="#333">key:B</text>
  <text x="430" y="238" class="mono" fill="#2ecc71">→ N2</text>
  <circle cx="170" cy="160" r="8" fill="#FFD93D" stroke="#333" stroke-width="1.5"/>
  <text x="135" y="155" class="mono" fill="#333">key:C</text>
  <text x="135" y="168" class="mono" fill="#e67e22">→ N3</text>
  <circle cx="200" cy="420" r="8" fill="#FFD93D" stroke="#333" stroke-width="1.5"/>
  <text x="175" y="440" class="mono" fill="#333">key:D</text>
  <text x="175" y="453" class="mono" fill="#e67e22">→ N3</text>
  <!-- Clockwise arrows showing key assignment -->
  <text x="250" y="480" text-anchor="middle" class="hand" font-size="12" fill="#888">key goes to next node clockwise on the ring</text>
</svg>
