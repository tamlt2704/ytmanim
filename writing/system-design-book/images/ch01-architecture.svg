<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400">
  <defs>
    <style>
      .label { font-family: Arial, sans-serif; font-size: 13px; font-weight: bold; }
      .detail { font-family: monospace; font-size: 10px; }
      .title { font-family: Arial, sans-serif; font-size: 16px; font-weight: bold; }
    </style>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3498db"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2ecc71"/>
    </marker>
  </defs>
  <rect width="750" height="400" fill="#fafafa" rx="10"/>
  <text x="375" y="30" text-anchor="middle" class="title" fill="#333">URL Shortener — Final Architecture</text>
  <!-- Client -->
  <rect x="20" y="80" width="100" height="50" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" rx="8"/>
  <text x="70" y="110" text-anchor="middle" class="label" fill="#333">Client</text>
  <!-- Load Balancer -->
  <rect x="180" y="80" width="100" height="50" fill="#3498db" stroke="#2980b9" stroke-width="2" rx="8"/>
  <text x="230" y="105" text-anchor="middle" class="label" fill="#fff">Load</text>
  <text x="230" y="120" text-anchor="middle" class="label" fill="#fff">Balancer</text>
  <!-- API Servers -->
  <rect x="340" y="60" width="120" height="30" fill="#9b59b6" stroke="#8e44ad" stroke-width="2" rx="6"/>
  <text x="400" y="80" text-anchor="middle" class="detail" fill="#fff">API Server 1</text>
  <rect x="340" y="100" width="120" height="30" fill="#9b59b6" stroke="#8e44ad" stroke-width="2" rx="6"/>
  <text x="400" y="120" text-anchor="middle" class="detail" fill="#fff">API Server 2</text>
  <rect x="340" y="140" width="120" height="30" fill="#9b59b6" stroke="#8e44ad" stroke-width="2" rx="6"/>
  <text x="400" y="160" text-anchor="middle" class="detail" fill="#fff">API Server N</text>
  <!-- Cache (Redis) -->
  <rect x="540" y="60" width="120" height="70" fill="#2ecc71" stroke="#27ae60" stroke-width="2" rx="8"/>
  <text x="600" y="90" text-anchor="middle" class="label" fill="#fff">Redis</text>
  <text x="600" y="108" text-anchor="middle" class="detail" fill="#d5f5e3">cache layer</text>
  <text x="600" y="122" text-anchor="middle" class="detail" fill="#d5f5e3">99% hit rate</text>
  <!-- Database -->
  <rect x="540" y="200" width="120" height="70" fill="#e67e22" stroke="#d35400" stroke-width="2" rx="8"/>
  <text x="600" y="230" text-anchor="middle" class="label" fill="#fff">PostgreSQL</text>
  <text x="600" y="250" text-anchor="middle" class="detail" fill="#ffeaa7">url_mappings</text>
  <!-- ID Generator -->
  <rect x="340" y="220" width="120" height="50" fill="#f39c12" stroke="#e67e22" stroke-width="2" rx="8"/>
  <text x="400" y="242" text-anchor="middle" class="label" fill="#fff">ID Range</text>
  <text x="400" y="258" text-anchor="middle" class="detail" fill="#fff">Service</text>
  <!-- Arrows -->
  <line x1="120" y1="105" x2="175" y2="105" stroke="#3498db" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="280" y1="90" x2="335" y2="80" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="280" y1="105" x2="335" y2="115" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="280" y1="120" x2="335" y2="155" stroke="#3498db" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <!-- API to Cache -->
  <line x1="460" y1="85" x2="535" y2="85" stroke="#2ecc71" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <text x="497" y="78" text-anchor="middle" class="detail" fill="#2ecc71">read</text>
  <!-- API to DB (write) -->
  <line x1="460" y1="155" x2="535" y2="220" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="485" y="195" class="detail" fill="#e67e22">write</text>
  <!-- Cache miss to DB -->
  <line x1="600" y1="130" x2="600" y2="195" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowBlue)"/>
  <text x="625" y="165" class="detail" fill="#e74c3c">miss</text>
  <!-- API to ID service -->
  <line x1="400" y1="170" x2="400" y2="215" stroke="#f39c12" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <!-- Legend -->
  <rect x="20" y="310" width="710" height="70" fill="#f5f5f5" rx="6"/>
  <text x="35" y="335" class="label" fill="#333">Write:</text>
  <text x="35" y="355" class="detail" fill="#666">POST → get ID → base62 encode → save DB → cache → return short URL</text>
  <text x="35" y="370" class="label" fill="#2ecc71">Read:</text>
  <text x="35" y="370" class="detail" fill="#666">                GET → check cache → HIT: redirect | MISS: read DB → cache → redirect</text>
</svg>
