<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 350">
  <defs>
    <style>
      .hand { font-family: 'Segoe Script', 'Comic Sans MS', cursive; }
      .mono { font-family: monospace; font-size: 11px; }
    </style>
    <filter id="rough">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5"/>
    </filter>
  </defs>
  <!-- Napkin background -->
  <rect width="700" height="350" fill="#fffef0" rx="8" stroke="#ddd" stroke-width="1"/>
  <!-- Coffee stain -->
  <circle cx="620" cy="60" r="35" fill="#d4a574" opacity="0.15"/>
  <circle cx="625" cy="55" r="30" fill="#d4a574" opacity="0.1"/>
  <text x="350" y="30" text-anchor="middle" class="hand" font-size="20" fill="#333">URL Shortener — napkin sketch</text>
  <!-- User -->
  <circle cx="80" cy="120" r="20" fill="none" stroke="#333" stroke-width="2" filter="url(#rough)"/>
  <line x1="80" y1="140" x2="80" y2="180" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="155" x2="60" y2="170" stroke="#333" stroke-width="2"/>
  <line x1="80" y1="155" x2="100" y2="170" stroke="#333" stroke-width="2"/>
  <text x="80" y="205" text-anchor="middle" class="hand" font-size="13" fill="#333">user</text>
  <!-- Arrow to API -->
  <line x1="110" y1="130" x2="190" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="150" y="120" text-anchor="middle" class="hand" font-size="10" fill="#888">POST /shorten</text>
  <!-- API box -->
  <rect x="200" y="100" width="120" height="60" fill="none" stroke="#3498db" stroke-width="2" rx="8" filter="url(#rough)"/>
  <text x="260" y="135" text-anchor="middle" class="hand" font-size="14" fill="#3498db">API</text>
  <!-- Arrow to DB -->
  <line x1="260" y1="160" x2="260" y2="230" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="275" y="200" class="hand" font-size="10" fill="#888">save</text>
  <!-- DB -->
  <ellipse cx="260" cy="260" rx="50" ry="20" fill="none" stroke="#e67e22" stroke-width="2" filter="url(#rough)"/>
  <rect x="210" y="260" width="100" height="30" fill="none" stroke="#e67e22" stroke-width="2"/>
  <ellipse cx="260" cy="290" rx="50" ry="20" fill="none" stroke="#e67e22" stroke-width="2"/>
  <text x="260" y="310" text-anchor="middle" class="hand" font-size="12" fill="#e67e22">DB</text>
  <text x="260" y="275" text-anchor="middle" class="mono" fill="#888">abc123 → long_url</text>
  <!-- Arrow to Cache -->
  <line x1="320" y1="130" x2="410" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Cache -->
  <rect x="420" y="100" width="120" height="60" fill="none" stroke="#2ecc71" stroke-width="2" rx="8" filter="url(#rough)"/>
  <text x="480" y="128" text-anchor="middle" class="hand" font-size="14" fill="#2ecc71">Cache</text>
  <text x="480" y="148" text-anchor="middle" class="hand" font-size="10" fill="#888">(Redis)</text>
  <!-- Read path -->
  <line x1="110" y1="145" x2="190" y2="145" stroke="#2ecc71" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="150" y="160" text-anchor="middle" class="hand" font-size="10" fill="#2ecc71">GET /abc123</text>
  <!-- Arrow from cache back -->
  <line x1="420" y1="145" x2="320" y2="145" stroke="#2ecc71" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="370" y="160" text-anchor="middle" class="hand" font-size="10" fill="#2ecc71">301 redirect</text>
  <!-- Notes -->
  <text x="500" y="220" class="hand" font-size="12" fill="#e74c3c">write: 40/sec</text>
  <text x="500" y="240" class="hand" font-size="12" fill="#2ecc71">read: 4000/sec</text>
  <text x="500" y="260" class="hand" font-size="12" fill="#333">ratio: 100:1</text>
  <text x="500" y="290" class="hand" font-size="11" fill="#888">→ cache everything!</text>
  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
</svg>
