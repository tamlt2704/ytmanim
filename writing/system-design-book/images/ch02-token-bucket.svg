<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280">
  <defs>
    <style>
      .hand { font-family: 'Segoe Script', 'Comic Sans MS', cursive; }
      .mono { font-family: monospace; font-size: 11px; }
    </style>
    <filter id="rough3">
      <feTurbulence type="turbulence" baseFrequency="0.015" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1"/>
    </filter>
  </defs>
  <rect width="700" height="280" fill="#fffef0" rx="8"/>
  <text x="350" y="28" text-anchor="middle" class="hand" font-size="18" fill="#333">Token Bucket Algorithm</text>
  <!-- Bucket -->
  <path d="M250,60 L220,230 L380,230 L350,60 Z" fill="#ecf0f1" stroke="#333" stroke-width="2" filter="url(#rough3)"/>
  <!-- Tokens (circles) -->
  <circle cx="270" cy="200" r="12" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <circle cx="300" cy="200" r="12" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <circle cx="330" cy="200" r="12" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <circle cx="285" cy="175" r="12" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <circle cx="315" cy="175" r="12" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <circle cx="300" cy="150" r="12" fill="#2ecc71" stroke="#27ae60" stroke-width="1.5"/>
  <!-- Refill arrow -->
  <path d="M300,40 L300,55" stroke="#3498db" stroke-width="3" marker-end="url(#blueArr)"/>
  <text x="300" y="35" text-anchor="middle" class="hand" font-size="11" fill="#3498db">refill: 100/min</text>
  <!-- Request consuming token -->
  <line x1="380" y1="200" x2="450" y2="200" stroke="#e67e22" stroke-width="2" marker-end="url(#blueArr)"/>
  <text x="415" y="190" text-anchor="middle" class="hand" font-size="10" fill="#e67e22">request takes 1</text>
  <!-- Allowed -->
  <rect x="460" y="80" width="180" height="50" fill="#2ecc71" rx="8" filter="url(#rough3)"/>
  <text x="550" y="110" text-anchor="middle" class="hand" font-size="14" fill="#fff">tokens > 0 → allow</text>
  <!-- Rejected -->
  <rect x="460" y="170" width="180" height="50" fill="#e74c3c" rx="8" filter="url(#rough3)"/>
  <text x="550" y="200" text-anchor="middle" class="hand" font-size="14" fill="#fff">tokens = 0 → reject</text>
  <!-- Labels -->
  <text x="300" y="255" text-anchor="middle" class="hand" font-size="12" fill="#888">bucket capacity: 100</text>
  <!-- Arrow marker -->
  <defs>
    <marker id="blueArr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
</svg>
