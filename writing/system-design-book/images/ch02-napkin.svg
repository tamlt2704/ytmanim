<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300">
  <defs>
    <style>
      .hand { font-family: 'Segoe Script', 'Comic Sans MS', cursive; }
      .mono { font-family: monospace; font-size: 10px; }
    </style>
    <filter id="rough2">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"/>
    </filter>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  <rect width="700" height="300" fill="#fffef0" rx="8" stroke="#ddd" stroke-width="1"/>
  <text x="350" y="28" text-anchor="middle" class="hand" font-size="18" fill="#333">Rate Limiter — napkin sketch</text>
  <!-- Bot -->
  <circle cx="60" cy="130" r="22" fill="none" stroke="#e74c3c" stroke-width="2" filter="url(#rough2)"/>
  <text x="60" y="125" text-anchor="middle" class="hand" font-size="10" fill="#e74c3c">🤖</text>
  <text x="60" y="140" text-anchor="middle" class="hand" font-size="9" fill="#e74c3c">bot</text>
  <text x="60" y="175" text-anchor="middle" class="hand" font-size="9" fill="#e74c3c">10M req/min</text>
  <!-- Arrow -->
  <line x1="85" y1="130" x2="155" y2="130" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Rate Limiter -->
  <rect x="160" y="100" width="140" height="60" fill="none" stroke="#e74c3c" stroke-width="2" rx="8" filter="url(#rough2)"/>
  <text x="230" y="128" text-anchor="middle" class="hand" font-size="14" fill="#e74c3c">Rate Limiter</text>
  <text x="230" y="148" text-anchor="middle" class="hand" font-size="10" fill="#888">(Redis)</text>
  <!-- Allowed path -->
  <line x1="300" y1="115" x2="400" y2="115" stroke="#2ecc71" stroke-width="2" marker-end="url(#arr)"/>
  <text x="350" y="108" text-anchor="middle" class="hand" font-size="10" fill="#2ecc71">allowed ✓</text>
  <!-- Blocked path -->
  <line x1="230" y1="160" x2="230" y2="230" stroke="#e74c3c" stroke-width="2" marker-end="url(#arr)"/>
  <text x="260" y="200" class="hand" font-size="10" fill="#e74c3c">blocked ✗</text>
  <text x="230" y="255" text-anchor="middle" class="hand" font-size="12" fill="#e74c3c">429 Too Many</text>
  <!-- API -->
  <rect x="410" y="90" width="100" height="50" fill="none" stroke="#3498db" stroke-width="2" rx="8" filter="url(#rough2)"/>
  <text x="460" y="120" text-anchor="middle" class="hand" font-size="14" fill="#3498db">API</text>
  <!-- DB -->
  <line x1="510" y1="115" x2="580" y2="115" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <ellipse cx="620" cy="115" rx="40" ry="18" fill="none" stroke="#e67e22" stroke-width="2" filter="url(#rough2)"/>
  <text x="620" y="120" text-anchor="middle" class="hand" font-size="12" fill="#e67e22">DB</text>
  <!-- Note -->
  <text x="500" y="200" class="hand" font-size="11" fill="#888">key insight:</text>
  <text x="500" y="218" class="hand" font-size="11" fill="#888">block BEFORE it</text>
  <text x="500" y="236" class="hand" font-size="11" fill="#888">touches the DB</text>
</svg>
