<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300">
  <defs>
    <style>
      .hand { font-family: 'Segoe Script', 'Comic Sans MS', cursive; }
    </style>
    <filter id="r4">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.2"/>
    </filter>
    <marker id="a4" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
  </defs>
  <rect width="700" height="300" fill="#fffef0" rx="8" stroke="#ddd" stroke-width="1"/>
  <text x="350" y="28" text-anchor="middle" class="hand" font-size="18" fill="#333">Key-Value Store — what we need</text>
  <!-- Memory -->
  <rect x="50" y="60" width="180" height="80" fill="none" stroke="#3498db" stroke-width="2" rx="8" filter="url(#r4)"/>
  <text x="140" y="85" text-anchor="middle" class="hand" font-size="14" fill="#3498db">MemTable</text>
  <text x="140" y="105" text-anchor="middle" class="hand" font-size="11" fill="#888">fast reads</text>
  <text x="140" y="120" text-anchor="middle" class="hand" font-size="11" fill="#888">fast writes</text>
  <!-- WAL -->
  <rect x="280" y="60" width="150" height="80" fill="none" stroke="#e67e22" stroke-width="2" rx="8" filter="url(#r4)"/>
  <text x="355" y="85" text-anchor="middle" class="hand" font-size="14" fill="#e67e22">WAL (disk)</text>
  <text x="355" y="105" text-anchor="middle" class="hand" font-size="11" fill="#888">append-only</text>
  <text x="355" y="120" text-anchor="middle" class="hand" font-size="11" fill="#888">survives restart</text>
  <!-- Arrow -->
  <line x1="230" y1="100" x2="275" y2="100" stroke="#333" stroke-width="2" marker-end="url(#a4)"/>
  <text x="252" y="92" text-anchor="middle" class="hand" font-size="9" fill="#888">write</text>
  <!-- Snapshot -->
  <rect x="480" y="60" width="150" height="80" fill="none" stroke="#2ecc71" stroke-width="2" rx="8" filter="url(#r4)"/>
  <text x="555" y="85" text-anchor="middle" class="hand" font-size="14" fill="#2ecc71">Snapshot</text>
  <text x="555" y="105" text-anchor="middle" class="hand" font-size="11" fill="#888">compacted</text>
  <text x="555" y="120" text-anchor="middle" class="hand" font-size="11" fill="#888">point-in-time</text>
  <!-- Arrow -->
  <line x1="430" y1="100" x2="475" y2="100" stroke="#333" stroke-width="2" marker-end="url(#a4)"/>
  <text x="452" y="92" text-anchor="middle" class="hand" font-size="9" fill="#888">compact</text>
  <!-- Replication -->
  <rect x="50" y="190" width="580" height="80" fill="none" stroke="#9b59b6" stroke-width="2" rx="8" filter="url(#r4)"/>
  <text x="340" y="215" text-anchor="middle" class="hand" font-size="14" fill="#9b59b6">Replication (3 nodes)</text>
  <rect x="80" y="230" width="120" height="30" fill="#9b59b6" rx="5" opacity="0.8"/>
  <text x="140" y="250" text-anchor="middle" class="hand" font-size="11" fill="#fff">Leader</text>
  <rect x="250" y="230" width="120" height="30" fill="#9b59b6" rx="5" opacity="0.5"/>
  <text x="310" y="250" text-anchor="middle" class="hand" font-size="11" fill="#fff">Follower 1</text>
  <rect x="420" y="230" width="120" height="30" fill="#9b59b6" rx="5" opacity="0.5"/>
  <text x="480" y="250" text-anchor="middle" class="hand" font-size="11" fill="#fff">Follower 2</text>
  <line x1="200" y1="245" x2="245" y2="245" stroke="#fff" stroke-width="1.5" marker-end="url(#a4)"/>
  <line x1="370" y1="245" x2="415" y2="245" stroke="#fff" stroke-width="1.5" marker-end="url(#a4)"/>
</svg>
