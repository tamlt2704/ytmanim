<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <style>
      .cartoon { font-family: 'Comic Sans MS', cursive, sans-serif; }
      .mono { font-family: monospace; font-size: 11px; }
    </style>
  </defs>
  <rect width="800" height="500" fill="#1a1a2e" rx="12"/>
  <!-- 2 AM clock -->
  <circle cx="60" cy="50" r="30" fill="#2d2d44" stroke="#FFD93D" stroke-width="2"/>
  <text x="60" y="56" text-anchor="middle" fill="#FFD93D" class="cartoon" font-size="14">2 AM</text>
  <!-- ZeroTrust character -->
  <circle cx="720" cy="60" r="25" fill="#FFD93D" stroke="#333" stroke-width="2"/>
  <circle cx="712" cy="55" r="4" fill="#333"/>
  <circle cx="728" cy="55" r="4" fill="#333"/>
  <path d="M710 70 Q720 63 730 70" stroke="#333" stroke-width="2" fill="none"/>
  <!-- Sunglasses -->
  <rect x="705" y="50" width="12" height="8" fill="#333" rx="2"/>
  <rect x="721" y="50" width="12" height="8" fill="#333" rx="2"/>
  <text x="720" y="105" text-anchor="middle" fill="#ccc" class="cartoon" font-size="11">ZeroTrust</text>
  <!-- FIFO Queue - the problem -->
  <text x="400" y="140" text-anchor="middle" fill="#fff" class="cartoon" font-size="18">FIFO Queue (the problem)</text>
  <!-- Queue boxes -->
  <rect x="50" y="160" width="70" height="40" fill="#95a5a6" rx="4"/>
  <text x="85" y="184" text-anchor="middle" fill="#fff" class="mono">LOW</text>
  <rect x="130" y="160" width="70" height="40" fill="#95a5a6" rx="4"/>
  <text x="165" y="184" text-anchor="middle" fill="#fff" class="mono">LOW</text>
  <rect x="210" y="160" width="70" height="40" fill="#95a5a6" rx="4"/>
  <text x="245" y="184" text-anchor="middle" fill="#fff" class="mono">LOW</text>
  <rect x="290" y="160" width="70" height="40" fill="#95a5a6" rx="4"/>
  <text x="325" y="184" text-anchor="middle" fill="#fff" class="mono">LOW</text>
  <text x="400" y="184" text-anchor="middle" fill="#888" class="mono">... 9,996 more ...</text>
  <rect x="560" y="160" width="70" height="40" fill="#95a5a6" rx="4"/>
  <text x="595" y="184" text-anchor="middle" fill="#fff" class="mono">LOW</text>
  <rect x="640" y="160" width="110" height="40" fill="#e74c3c" rx="4" stroke="#FFD93D" stroke-width="2"/>
  <text x="695" y="178" text-anchor="middle" fill="#fff" class="mono" font-size="10">🚨 CRITICAL</text>
  <text x="695" y="192" text-anchor="middle" fill="#ffcccc" class="mono" font-size="9">fraud alert</text>
  <!-- Arrow showing stuck -->
  <text x="695" y="220" text-anchor="middle" fill="#e74c3c" class="cartoon" font-size="12">stuck at the back!</text>
  <path d="M695 225 L695 240" stroke="#e74c3c" stroke-width="2" marker-end="url(#arrowRed)"/>
  <!-- Priority Queue - the fix -->
  <text x="400" y="290" text-anchor="middle" fill="#2ecc71" class="cartoon" font-size="18">PriorityBlockingQueue (the fix)</text>
  <!-- Priority queue boxes -->
  <rect x="50" y="310" width="110" height="40" fill="#e74c3c" rx="4" stroke="#FFD93D" stroke-width="2"/>
  <text x="105" y="328" text-anchor="middle" fill="#fff" class="mono" font-size="10">🚨 CRITICAL</text>
  <text x="105" y="342" text-anchor="middle" fill="#ffcccc" class="mono" font-size="9">fraud alert</text>
  <rect x="170" y="310" width="80" height="40" fill="#e67e22" rx="4"/>
  <text x="210" y="334" text-anchor="middle" fill="#fff" class="mono">HIGH</text>
  <rect x="260" y="310" width="80" height="40" fill="#3498db" rx="4"/>
  <text x="300" y="334" text-anchor="middle" fill="#fff" class="mono">NORMAL</text>
  <rect x="350" y="310" width="70" height="40" fill="#95a5a6" rx="4"/>
  <text x="385" y="334" text-anchor="middle" fill="#fff" class="mono">LOW</text>
  <rect x="430" y="310" width="70" height="40" fill="#95a5a6" rx="4"/>
  <text x="465" y="334" text-anchor="middle" fill="#fff" class="mono">LOW</text>
  <text x="540" y="334" text-anchor="middle" fill="#888" class="mono">... 9,998 more ...</text>
  <!-- Arrow showing first out -->
  <path d="M105 355 L105 380" stroke="#2ecc71" stroke-width="3"/>
  <text x="105" y="400" text-anchor="middle" fill="#2ecc71" class="cartoon" font-size="14">dequeued FIRST ✅</text>
  <!-- Bottom message -->
  <rect x="150" y="430" width="500" height="45" fill="#2ecc71" rx="8" opacity="0.9"/>
  <text x="400" y="458" text-anchor="middle" fill="#fff" class="cartoon" font-size="15">Fraud alert executes in &lt; 1 second</text>
</svg>
