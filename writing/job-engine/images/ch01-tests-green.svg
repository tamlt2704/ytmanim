<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200">
  <defs>
    <style>
      .mono { font-family: monospace; font-size: 13px; }
      .cartoon { font-family: 'Comic Sans MS', cursive, sans-serif; }
    </style>
  </defs>
  <rect width="500" height="200" fill="#1a1a2e" rx="10"/>
  <!-- Terminal output -->
  <text x="20" y="30" class="mono" fill="#888">$ ./gradlew test</text>
  <text x="20" y="60" class="mono" fill="#2ecc71">✓ shouldRunASingleJob</text>
  <text x="20" y="80" class="mono" fill="#2ecc71">✓ shouldHandleAFailingJob</text>
  <text x="20" y="100" class="mono" fill="#2ecc71">✓ shouldNotExecuteACancelledJob</text>
  <text x="20" y="130" class="mono" fill="#2ecc71">BUILD SUCCESSFUL — 3 tests passed</text>
  <!-- Intern leaning back -->
  <circle cx="430" cy="130" r="25" fill="#FFD93D" stroke="#333" stroke-width="2"/>
  <circle cx="422" cy="127" r="4" fill="#333"/>
  <circle cx="438" cy="127" r="4" fill="#333"/>
  <path d="M420,140 Q430,148 440,140" stroke="#333" stroke-width="2" fill="none"/>
  <text x="430" y="175" text-anchor="middle" class="cartoon" font-size="11" fill="#888">not so bad</text>
</svg>
