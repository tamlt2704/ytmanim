<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <style>
      .hand { font-family: 'Segoe Script', 'Comic Sans MS', cursive; }
      .mono { font-family: monospace; font-size: 12px; }
    </style>
    <!-- Rough/sketchy filter -->
    <filter id="rough">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5"/>
    </filter>
  </defs>
  <rect width="800" height="450" fill="#fffef5" rx="12"/>
  <text x="400" y="35" text-anchor="middle" class="hand" font-size="22" fill="#333">Why Thread B can't see Thread A's write</text>
  <!-- Core 1 -->
  <rect x="50" y="70" width="280" height="160" fill="#e8f4fd" stroke="#3498db" stroke-width="2" rx="10" filter="url(#rough)"/>
  <text x="190" y="95" text-anchor="middle" class="hand" font-size="18" fill="#3498db">Core 1 (Thread A)</text>
  <rect x="80" y="110" width="220" height="50" fill="#fff" stroke="#3498db" stroke-width="1.5" rx="6"/>
  <text x="190" y="130" text-anchor="middle" class="hand" font-size="14" fill="#333">L1 Cache</text>
  <text x="190" y="150" text-anchor="middle" class="mono" fill="#2ecc71">startedAt = 10:30:05 ✓</text>
  <text x="190" y="200" text-anchor="middle" class="hand" font-size="12" fill="#888">wrote it here, stays here</text>
  <!-- Core 2 -->
  <rect x="470" y="70" width="280" height="160" fill="#fdf2e8" stroke="#e67e22" stroke-width="2" rx="10" filter="url(#rough)"/>
  <text x="610" y="95" text-anchor="middle" class="hand" font-size="18" fill="#e67e22">Core 2 (Thread B)</text>
  <rect x="500" y="110" width="220" height="50" fill="#fff" stroke="#e67e22" stroke-width="1.5" rx="6"/>
  <text x="610" y="130" text-anchor="middle" class="hand" font-size="14" fill="#333">L1 Cache</text>
  <text x="610" y="150" text-anchor="middle" class="mono" fill="#e74c3c">startedAt = null ✗</text>
  <text x="610" y="200" text-anchor="middle" class="hand" font-size="12" fill="#888">still reading old value!</text>
  <!-- Main Memory -->
  <rect x="250" y="290" width="300" height="70" fill="#f5f5f5" stroke="#999" stroke-width="2" rx="10" filter="url(#rough)"/>
  <text x="400" y="315" text-anchor="middle" class="hand" font-size="16" fill="#333">Main Memory</text>
  <text x="400" y="340" text-anchor="middle" class="mono" fill="#999">startedAt = ??? (maybe stale)</text>
  <!-- Arrows -->
  <path d="M190 230 Q190 270 320 290" stroke="#3498db" stroke-width="2" fill="none" stroke-dasharray="8,4" marker-end="url(#arrow)"/>
  <text x="220" y="270" class="hand" font-size="11" fill="#3498db">might flush... eventually</text>
  <path d="M610 230 Q610 270 480 290" stroke="#e67e22" stroke-width="2" fill="none" stroke-dasharray="8,4"/>
  <text x="540" y="270" class="hand" font-size="11" fill="#e67e22">reads from own cache</text>
  <!-- Fix arrow -->
  <rect x="200" y="390" width="400" height="45" fill="#2ecc71" rx="8" opacity="0.9"/>
  <text x="400" y="418" text-anchor="middle" class="hand" font-size="16" fill="#fff">Fix: volatile → forces flush to main memory</text>
</svg>
