<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 180">
  <defs>
    <style>
      .cartoon { font-family: 'Comic Sans MS', cursive, sans-serif; }
      .mono { font-family: monospace; font-size: 12px; }
    </style>
  </defs>
  <rect width="500" height="180" fill="#2d2d44" rx="10"/>
  <!-- NullPointer character -->
  <circle cx="60" cy="70" r="25" fill="#FFD93D" stroke="#333" stroke-width="2"/>
  <circle cx="52" cy="66" r="4" fill="#333"/>
  <circle cx="68" cy="66" r="4" fill="#333"/>
  <path d="M52,80 L68,80" stroke="#333" stroke-width="2" fill="none"/>
  <!-- Ponytail -->
  <path d="M80,50 Q95,55 90,75" stroke="#4a3728" stroke-width="3" fill="none"/>
  <text x="60" y="115" text-anchor="middle" class="cartoon" font-size="11" fill="#ccc">NullPointer</text>
  <!-- Slack message -->
  <rect x="110" y="25" width="370" height="55" fill="#3d3d5c" rx="6"/>
  <text x="120" y="48" class="cartoon" font-size="13" fill="#e74c3c">@NullPointer</text>
  <text x="120" y="68" class="mono" fill="#ccc">Pipeline stuck 3 hours. No errors in logs.</text>
  <text x="120" y="145" class="cartoon" font-size="10" fill="#888">"it's the upstream's fault" — her, weekly</text>
</svg>
