<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <style>
      .mono { font-family: monospace; font-size: 12px; }
      .label { font-family: monospace; font-size: 14px; font-weight: bold; }
      .title { font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
    </style>
  </defs>
  <rect width="800" height="450" fill="#fafafa" rx="12"/>
  <text x="400" y="35" text-anchor="middle" class="title" fill="#333">Compare-And-Swap (CAS) â€” Atomic Transition</text>
  <!-- Timeline -->
  <line x1="100" y1="80" x2="100" y2="400" stroke="#ddd" stroke-width="2"/>
  <line x1="400" y1="80" x2="400" y2="400" stroke="#ddd" stroke-width="2"/>
  <text x="100" y="70" text-anchor="middle" class="label" fill="#3498db">Thread A</text>
  <text x="400" y="70" text-anchor="middle" class="label" fill="#e67e22">Thread B</text>
  <!-- Status box -->
  <rect x="600" y="80" width="160" height="40" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2" rx="6"/>
  <text x="680" y="105" text-anchor="middle" class="mono" fill="#333">status: PENDING</text>
  <!-- Step 1: Thread A CAS -->
  <rect x="20" y="130" width="220" height="50" fill="#3498db" rx="6"/>
  <text x="130" y="152" text-anchor="middle" fill="#fff" class="mono">CAS(PENDINGâ†’RUNNING)</text>
  <text x="130" y="170" text-anchor="middle" fill="#cce5ff" class="mono">returns: true âś…</text>
  <!-- Arrow to status -->
  <line x1="240" y1="155" x2="600" y2="100" stroke="#3498db" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Status updated -->
  <rect x="600" y="140" width="160" height="40" fill="#2ecc71" stroke="#27ae60" stroke-width="2" rx="6"/>
  <text x="680" y="165" text-anchor="middle" class="mono" fill="#fff">status: RUNNING</text>
  <!-- Step 2: Thread B CAS -->
  <rect x="320" y="210" width="220" height="50" fill="#e67e22" rx="6"/>
  <text x="430" y="232" text-anchor="middle" fill="#fff" class="mono">CAS(PENDINGâ†’RUNNING)</text>
  <text x="430" y="250" text-anchor="middle" fill="#ffeaa7" class="mono">returns: false âťŚ</text>
  <!-- X mark -->
  <line x1="540" y1="235" x2="600" y2="160" stroke="#e74c3c" stroke-width="2" stroke-dasharray="5,3"/>
  <circle cx="570" cy="198" r="12" fill="none" stroke="#e74c3c" stroke-width="2"/>
  <line x1="562" y1="190" x2="578" y2="206" stroke="#e74c3c" stroke-width="2"/>
  <line x1="578" y1="190" x2="562" y2="206" stroke="#e74c3c" stroke-width="2"/>
  <!-- Thread A executes -->
  <rect x="20" y="290" width="220" height="35" fill="#2ecc71" rx="6"/>
  <text x="130" y="312" text-anchor="middle" fill="#fff" class="mono">Executes job âś…</text>
  <!-- Thread B skips -->
  <rect x="320" y="290" width="220" height="35" fill="#95a5a6" rx="6"/>
  <text x="430" y="312" text-anchor="middle" fill="#fff" class="mono">Skips (already taken)</text>
  <!-- Result -->
  <rect x="200" y="370" width="400" height="50" fill="#2ecc71" rx="10"/>
  <text x="400" y="400" text-anchor="middle" fill="#fff" class="label">Job executes exactly once âś…</text>
</svg>
